<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>历史记录</title>
</head>
<body>
    <h2>我的操作历史</h2>

    <form action="/search" method="post">
        <input name="keyword" placeholder="输入关键词检索">
        <button>检索</button>
    </form>

    {% for r in records %}
    <div>
        {{r.time}} | {{r.user}} | {{r.action}}
    </div>
    {% endfor %}

<br>
<a href="/">返回首页</a>
</body>
</html>
