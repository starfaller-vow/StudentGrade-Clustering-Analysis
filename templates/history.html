{% extends "base.html" %}

{% block content %}
<div class="card p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">我的操作历史</h2>
        <a href="/logout" class="btn btn-outline-danger btn-sm">退出登录</a>
    </div>

    <form action="/search" method="post" class="d-flex mb-4">
        <input name="keyword" class="form-control me-2" placeholder="输入关键词检索">
        <button class="btn btn-outline-primary">检索</button>
    </form>

    {% if search_tip %}
    <div class="alert alert-info">
        {{ search_tip }}
    </div>
    {% endif %}

    <div class="list-group">
        {% for r in records %}
        <div class="list-group-item">
            <span class="badge bg-secondary me-2">{{ r.time }}</span>
            <strong>{{ r.user }}</strong>：{{ r.action }}
        </div>
        {% else %}
        <div class="text-muted">暂无操作记录</div>
        {% endfor %}
    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-link">返回首页</a>
    </div>

</div>
{% endblock %}
