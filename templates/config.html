<!DOCTYPE html>
<html>
<head>
    <title>清洗规则配置</title>
</head>
<body>
<h2>自动化清洗规则配置</h2>
<form action="/save_config" method="post">
    <input type="hidden" name="filename" value="{{ filename }}">

    <h4>数值范围</h4>
    最小值：<input type="number" name="min_val" value="0" required><br>
    最大值：<input type="number" name="max_val" value="100" required><br>

    <h4>功能开关</h4>
    <label><input type="checkbox" name="remove_outliers" checked> 删除异常值</label><br>
    <label><input type="checkbox" name="fill_missing" checked> 填充缺失值</label><br>

    <h4>选择要清洗的列</h4>
    {% for col in columns %}
    <label><input type="checkbox" name="clean_cols" value="{{ col }}" checked> {{ col }}</label><br>
    {% endfor %}

    <br><br>
    <button type="submit">保存并应用规则</button>
</form>
</body>
</html>
