<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="text-center">文件上传与预览</h2>
    <form method="post" enctype="multipart/form-data" class="mt-4">
        <input type="file" name="file" class="form-control mb-3" accept=".csv,.xlsx">
        <button type="submit" class="btn btn-primary">上传并预览</button>
    </form>
    {% if table_html %}
        <h4 class="mt-4">数据预览</h4>
        {{ table_html|safe }}
        <a href="/download/{{filename}}" class="btn btn-success mt-3">下载原文件</a>
        <a href="/clean/{{filename}}" class="btn btn-warning mt-3">进行数据清洗</a>
    {% endif %}
<a href="/history">查看我的历史记录</a>
</body>
</html>
