{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="text-center mb-3">学生成绩可视化分析</h2>

    <p class="text-center text-muted mb-4">
        通过柱状图、折线图和散点图展示学生成绩分布与科目表现。
    </p>

    {% if error_msg %}
    <div class="alert alert-warning text-center">
        {{ error_msg }}
    </div>
    {% endif %}

    <div class="text-center mb-4">
        <a href="/cluster" class="btn btn-info">
            进入 K-Means 聚类分析
        </a>

        <a href="/clean/{{ session['current_clean_filename'] }}" class="btn btn-secondary ms-2">
            返回清洗页面
        </a>
    </div>

    <div class="chart-card mb-4">
        <div id="barChart" class="chart-box"></div>
    </div>

    <div class="chart-card mb-4">
        <div id="lineChart" class="chart-box"></div>
    </div>

    <div class="chart-card mb-4">
        <div id="scatterChart" class="chart-box"></div>
    </div>

</div>

{% endblock %}

{% block script %}

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>


<script id="chartData" type="application/json">
    {{ chart_data|tojson }}
</script>

<script>
    const data = JSON.parse(document.getElementById('chartData').textContent);

    const barChart = echarts.init(document.getElementById('barChart'));
    let barSeries = [];

    data.subjects.forEach((sub, i) => {
        barSeries.push({
            name: sub,
            type: 'bar',
            data: data.scores.map(item => item[i])
        });
    });

    barChart.setOption({
        title: {
            text: '每位学生各科成绩对比',
            left: 'center'
        },
        tooltip: {
            trigger: 'axis'
        },
        legend: {
            data: data.subjects,
            top: 30
        },
        grid: {
            top: 90,
            left: 60,
            right: 30,
            bottom: 50
        },
        xAxis: {
            type: 'category',
            data: data.names
        },
        yAxis: {
            type: 'value',
            min: 0,
            max: data.score_max
        },
        series: barSeries
    });

    const lineChart = echarts.init(document.getElementById('lineChart'));

    let avgScore = data.subjects.map((_, i) => {
        let sum = 0;
        data.scores.forEach(s => sum += Number(s[i] || 0));
        return (sum / data.scores.length).toFixed(2);
    });

    lineChart.setOption({
        title: {
            text: '各科平均分对比',
            left: 'center'
        },
        tooltip: {
            trigger: 'axis'
        },
        grid: {
            top: 80,
            left: 60,
            right: 30,
            bottom: 50
        },
        xAxis: {
            type: 'category',
            data: data.subjects
        },
        yAxis: {
            type: 'value',
            min: 0,
            max: data.score_max
        },
        series: [
            {
                type: 'line',
                data: avgScore,
                smooth: true,
                markPoint: {
                    data: [
                        { type: 'max' },
                        { type: 'min' }
                    ]
                }
            }
        ]
    });

    const scatterChart = echarts.init(document.getElementById('scatterChart'));

    let scatterData = data.names.map((name, i) => [
        data.x_axis_data[i],
        data.totals[i],
        name
    ]);

    scatterChart.setOption({
        title: {
            text: data.x_axis_col + '成绩 — 总分相关性散点图',
            left: 'center'
        },
        tooltip: {
            trigger: 'item',
            formatter: params => `${params.data[2]}<br>${data.x_axis_col}：${params.data[0]}<br>总分：${params.data[1]}`
        },
        grid: {
            top: 80,
            left: 70,
            right: 40,
            bottom: 60
        },
        xAxis: {
            name: data.x_axis_col + '成绩',
            min: 0,
            max: data.score_max
        },
        yAxis: {
            name: '总分',
            min: 0,
            max: data.total_max
        },
        series: [
            {
                type: 'scatter',
                data: scatterData,
                symbolSize: 12
            }
        ]
    });

    window.addEventListener('resize', function () {
        barChart.resize();
        lineChart.resize();
        scatterChart.resize();
    });
</script>

{% endblock %}
