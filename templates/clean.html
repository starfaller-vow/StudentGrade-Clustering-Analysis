{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="text-center mb-3">数据清洗结果</h2>

    <p class="text-center text-muted mb-4">
        数据已根据配置规则完成清洗，可继续调整规则、进入可视化分析或下载清洗后的文件。
    </p>

    {% if clean_table %}

        <h4 class="mb-3">清洗后数据预览</h4>

        <div class="table-responsive">
            {{ clean_table|safe }}
        </div>

        <div class="mt-4 text-center">
            <a href="/download_clean/{{ clean_filename }}" class="btn btn-success">
                下载清洗后的文件
            </a>

            <a href="/config/{{ filename }}" class="btn btn-danger ms-2">
                继续配置清洗规则
            </a>

            <a href="/visualize" class="btn btn-warning ms-2">
                进入可视化分析
            </a>

            <a href="/" class="btn btn-primary ms-2">
                返回上传页面
            </a>
        </div>

    {% endif %}

</div>

{% endblock %}
