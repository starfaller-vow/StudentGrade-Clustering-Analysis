<style>
table {
    width: 90%;
    margin: 20px auto;
    border-collapse: collapse;
    text-align: center;
}
table th, table td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}
table th {
    background-color: #f5f5f5;
}
</style>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据清洗完成</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="text-center">数据清洗结果</h2>

    {% if clean_table %}
    <h4 class="mt-4">清洗后数据预览</h4>
    {{ clean_table|safe }}

    <br>
    <a href="/download_clean/{{ clean_filename }}" class="btn btn-success mt-3">下载清洗后的文件</a>

    <!-- ✅ 这里固定用原始文件名，实现叠加清洗 -->
    <a href="/config/{{ filename }}" class="btn btn-danger mt-3 ms-2">继续配置清洗规则</a>

    <a href="/visualize" class="btn btn-warning mt-3 ms-2">进入可视化分析</a>
    <a href="/" class="btn btn-primary mt-3 ms-2">返回上传页面</a>
    {% endif %}

</body>
</html>
