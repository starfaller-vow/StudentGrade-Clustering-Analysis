{% extends "base.html" %}
{% block content %}

<div class="card p-4">
    <h2 class="text-center mb-3">K-Means 聚类分析配置</h2>
    <p class="text-center text-muted mb-4">
        选择用于聚类的科目和聚类数量，系统将自动对学生成绩进行分群
    </p>

    {% if error_msg %}
    <div class="alert alert-danger text-center">{{ error_msg }}</div>
    {% else %}
    <form method="POST" action="/cluster_analysis">
        <div class="mb-4">
            <label class="form-label fw-bold">1. 选择用于聚类的科目（可多选）</label>
            <div class="row">
                {% for col in subject_cols %}
                <div class="col-md-3 col-sm-6 mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="cluster_cols" value="{{ col }}" id="col_{{ loop.index }}" checked>
                        <label class="form-check-label" for="col_{{ loop.index }}">
                            {{ col }}
                        </label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">2. 选择聚类数量（2-5类）</label>
            <select class="form-select w-25" name="n_clusters" required>
                <option value="2">2类（优等生/后进生）</option>
                <option value="3" selected>3类（优等生/中等生/后进生）</option>
                <option value="4">4类（优/良/中/差）</option>
                <option value="5">5类（优/良/中/待提高/差）</option>
            </select>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary btn-lg">
                开始聚类分析
            </button>
            <button type="button" class="btn btn-secondary btn-lg ms-3" onclick="history.back()">
                返回
            </button>
        </div>
    </form>
    {% endif %}
</div>

{% endblock %}
