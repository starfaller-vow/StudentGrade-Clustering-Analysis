{% extends "base.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="text-center mb-3">学生成绩可视化分析</h2>

    <p class="text-center text-muted mb-4">
        通过柱状图、折线图和散点图展示学生成绩分布与科目表现
    </p>

    <div class="text-center mb-4">
        <a href="/cluster" class="btn btn-info">
            进入 K-Means 聚类分析
        </a>
        <button class="btn btn-secondary ms-2" onclick="history.back()">
            返回清洗页面
        </button>
    </div>

    {% if error_msg %}
    <div class="alert alert-danger text-center">
        {{ error_msg }}
    </div>
    {% endif %}

    {% if chart_data.names|length == 0 %}
    <div class="alert alert-warning text-center">
        暂无可用数据，请先上传并清洗数据！
    </div>
    {% else %}
    <!-- 1. 柱状图：学生-科目分组对比（修复对齐问题） -->
    <div class="chart-card mb-4">
        <div id="barChart" class="chart-box"></div>
    </div>

    <!-- 2. 折线图：各科平均分 -->
    <div class="chart-card mb-4">
        <div id="lineChart" class="chart-box"></div>
    </div>

    <!-- 3. 散点图：科目成绩 vs 总分 -->
    <div class="chart-card mb-4">
        <div id="scatterChart" class="chart-box"></div>
    </div>
    {% endif %}
</div>

{% endblock %}

{% block script %}

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<script>
    const data = {{ chart_data|tojson }};

    // 窗口resize统一处理
    const resizeCharts = (charts) => {
        return () => {
            charts.forEach(chart => chart && chart.resize());
        };
    };

    // 1. 柱状图：修复分组对齐问题
    let barChart = null;
    if (data.names.length > 0 && data.subjects.length > 0) {
        barChart = echarts.init(document.getElementById('barChart'));
        let barSeries = [];

        // 为每个科目创建一个系列，数据为该科目下所有学生的成绩
        data.subjects.forEach((sub, i) => {
            barSeries.push({
                name: sub,
                type: 'bar',
                // 核心修复：data 取每个学生的第i个科目成绩，而不是之前的转置
                data: data.scores.map(student => student[i] || 0)
            });
        });

        barChart.setOption({
            title: {
                text: '每位学生各科成绩对比',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            legend: {
                data: data.subjects,
                top: 30,
                type: 'scroll',
                orient: 'horizontal'
            },
            grid: {
                top: 90,
                left: 60,
                right: 30,
                bottom: 50
            },
            xAxis: {
                type: 'category',
                data: data.names,
                axisLabel: {
                    rotate: 30,
                    interval: 0 // 强制显示所有学生姓名，不会被省略
                }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: data.score_max
            },
            series: barSeries
        });
    }

    // 2. 折线图：各科平均分（已删除平均线）
    let lineChart = null;
    if (data.names.length > 0 && data.subjects.length > 0) {
        lineChart = echarts.init(document.getElementById('lineChart'));

        let avgScore = data.subjects.map((_, i) => {
            let sum = 0;
            let count = 0;
            // 计算该科目所有学生的平均分
            data.scores.forEach(student => {
                const val = student[i];
                if (!isNaN(val) && val !== null && val >= 0) {
                    sum += val;
                    count++;
                }
            });
            return count > 0 ? parseFloat((sum / count).toFixed(2)) : 0;
        });

        lineChart.setOption({
            title: {
                text: '各科平均分对比',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis'
            },
            grid: {
                top: 80,
                left: 60,
                right: 30,
                bottom: 50
            },
            xAxis: {
                type: 'category',
                data: data.subjects,
                axisLabel: {
                    rotate: 30,
                    interval: 0
                }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: data.score_max
            },
            series: [
                {
                    type: 'line',
                    data: avgScore,
                    smooth: true,
                    lineStyle: { width: 3 },
                    markPoint: {
                        data: [
                            { type: 'max', name: '最高分' },
                            { type: 'min', name: '最低分' }
                        ]
                    }
                }
            ]
        });
    }

    // 3. 散点图：修复数据读取逻辑
    let scatterChart = null;
    if (data.names.length > 0) {
        scatterChart = echarts.init(document.getElementById('scatterChart'));

        let scatterData = data.names.map((name, i) => [
            data.x_axis_data[i] || 0,
            data.totals[i] || 0,
            name
        ]);

        // 自动计算坐标轴范围
        const xMin = Math.min(...scatterData.map(d => d[0])) - 5;
        const xMax = Math.max(...scatterData.map(d => d[0])) + 5;
        const yMin = Math.min(...scatterData.map(d => d[1])) - 20;
        const yMax = Math.max(...scatterData.map(d => d[1])) + 20;

        scatterChart.setOption({
            title: {
                text: `${data.x_axis_col}成绩 — 总分相关性散点图`,
                left: 'center'
            },
            tooltip: {
                trigger: 'item',
                formatter: params => `${params.data[2]}<br>${data.x_axis_col}：${params.data[0]}<br>总分：${params.data[1]}`
            },
            grid: {
                top: 80,
                left: 70,
                right: 40,
                bottom: 60
            },
            xAxis: {
                name: `${data.x_axis_col}成绩`,
                min: Math.max(xMin, 0),
                max: Math.min(xMax, data.score_max)
            },
            yAxis: {
                name: '总分',
                min: Math.max(yMin, 0),
                max: Math.max(yMax, data.total_max)
            },
            series: [
                {
                    type: 'scatter',
                    data: scatterData,
                    symbolSize: 12,
                    itemStyle: {
                        color: '#409EFF',
                        opacity: 0.8
                    }
                }
            ]
        });
    }

    // 绑定resize事件
    window.addEventListener('resize', resizeCharts([barChart, lineChart, scatterChart]));
</script>
{% endblock %}
